<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0a080d;
    font-family: 'Courier New', 'Lucida Console', monospace;
  }

  /* Crimson diagonal grain */
  .stripes {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        -55deg,
        transparent 0px,
        transparent 52px,
        rgba(140, 20, 60, 0.025) 52px,
        rgba(140, 20, 60, 0.025) 54px
      );
  }

  /* Rose-crimson glow behind name */
  .glow-blob {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 860px;
    height: 420px;
    background: radial-gradient(ellipse, rgba(180, 30, 80, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }

  /* Top broadsheet rule */
  .card::before {
    content: '';
    position: absolute;
    top: 28px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #6b1a35, transparent);
  }

  /* Bottom broadsheet rule */
  .card::after {
    content: '';
    position: absolute;
    bottom: 28px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #6b1a35, transparent);
  }

  /* Crimson accent bar */
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #9e1a44;
  }

  .lab-tag {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #5a3a48;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .name {
    font-size: 74px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #ede4ec;
    line-height: 1;
    margin-bottom: 22px;
    text-shadow:
      0 0 80px rgba(180, 30, 80, 0.28),
      0 0 30px rgba(180, 30, 80, 0.14);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 860px;
    margin-bottom: 22px;
  }

  .div-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a0f1a);
  }

  .div-line:last-child {
    background: linear-gradient(90deg, #2a0f1a, transparent);
  }

  .div-mark {
    color: #c06080;
    font-size: 11px;
    letter-spacing: 0.15em;
    white-space: nowrap;
  }

  .epithet {
    font-size: 18px;
    color: #c06080;
    letter-spacing: 0.06em;
    font-style: italic;
    margin-bottom: 30px;
    text-align: center;
  }

  .tags {
    display: flex;
    gap: 14px;
  }

  .tag {
    font-size: 13px;
    color: #c06080;
    border: 1px solid #2a0f1a;
    padding: 4px 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(180, 30, 80, 0.05);
  }
</style>
</head>
<body>
  <div class="stripes"></div>
  <div class="accent-bar"></div>
  <div class="glow-blob"></div>
  <div class="card">
    <div class="lab-tag">The Elect &mdash; Voice Lab &middot; Junius</div>
    <div class="name">ROSA LUXEMBURG</div>
    <div class="divider">
      <span class="div-line"></span>
      <span class="div-mark">&#x25A0; FREEDOM IS ALWAYS THE FREEDOM OF THE ONE WHO THINKS DIFFERENTLY &#x25A0;</span>
      <span class="div-line"></span>
    </div>
    <div class="epithet">revolutionary socialist &mdash; a voice model in her own words</div>
    <div class="tags">
      <span class="tag">Free</span>
      <span class="tag">Qwen2.5-7B</span>
      <span class="tag">CC-BY-NC-4.0</span>
    </div>
  </div>
</body>
</html>
